name: Cab Booking CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ vars.DOCKER_PASSWORD }}

      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        working-directory: client
        run: npm ci

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
            context: ./client
            push: true
            tags: |
                ${{ secrets.DOCKER_USERNAME }}/cab-booking-client:latest
                ${{ secrets.DOCKER_USERNAME }}/cab-booking-client:${{ github.sha }}


      - name: Install Backend Dependencies
        working-directory: server
        run: npm ci

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
            context: ./server
            push: true
            tags: |
                ${{ secrets.DOCKER_USERNAME }}/cab-booking-server:latest
                ${{ secrets.DOCKER_USERNAME }}/cab-booking-server:${{ github.sha }}

