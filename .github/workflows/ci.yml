name: Cab Booking CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        working-directory: client
        run: npm ci

      - name: Build Frontend
        uses: docker/build-push-action@v6
        with:
            context: .
            file: ./client/Dockerfile
            push: false
            tags: cab-booking-client:latest

      - name: Install Backend Dependencies
        working-directory: server
        run: npm ci

      - name: Build Backend
        uses: docker/build-push-action@v6
        with:
            context: ./server
            push: false
            tags: cab-booking-server:latest
