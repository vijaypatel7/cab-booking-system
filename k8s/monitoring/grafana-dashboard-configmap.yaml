apiVersion: v1
kind: ConfigMap

metadata:
  name: cab-booking-dashboard
  namespace: monitoring

  labels:
    grafana_dashboard: "1"
    app: grafana
    app.kubernetes.io/name: cab-booking-dashboard
    app.kubernetes.io/component: monitoring

  annotations:
    grafana_folder: "Cab Booking"

data:
  cab-booking-dashboard.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "title": "Cab Booking - Production Dashboard",
      "uid": "cab-booking-prod-v1",
      "description": "Full production dashboard: HTTP traffic, latency, Node.js runtime, Kubernetes",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "graphTooltip": 1,
      "tags": ["cab-booking", "nodejs", "production", "kubernetes"],
      "time": { "from": "now-1h", "to": "now" },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          },
          {
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "enable": true,
            "expr": "changes(cab_booking_process_start_time_seconds{namespace=\"cab-booking\"}[2m]) > 0",
            "hide": false,
            "iconColor": "orange",
            "name": "Pod Restarts",
            "step": "60s",
            "titleFormat": "Pod Restart: {{pod}}",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "current": {},
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(cab_booking_nodejs_version_info{namespace=\"cab-booking\"}, pod)",
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
            "label": "Pod",
            "multi": true,
            "name": "pod",
            "options": [],
            "query": {
              "query": "label_values(cab_booking_nodejs_version_info{namespace=\"cab-booking\"}, pod)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          },
          {
            "current": {},
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(cab_booking_nodejs_version_info{namespace=\"cab-booking\",pod=~\"$pod\"}, instance)",
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
            "label": "Instance",
            "multi": true,
            "name": "instance",
            "options": [],
            "query": {
              "query": "label_values(cab_booking_nodejs_version_info{namespace=\"cab-booking\",pod=~\"$pod\"}, instance)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "🚖 Executive Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10000 },
                  { "color": "red", "value": 100000 }
                ]
              },
              "unit": "short",
              "decimals": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\"}[$__range]))",
              "instant": true,
              "legendFormat": "Total Requests",
              "refId": "A"
            }
          ],
          "title": "📊 Total Requests",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 100 },
                  { "color": "red", "value": 500 }
                ]
              },
              "unit": "reqps",
              "decimals": 2
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\"}[5m]))",
              "instant": true,
              "legendFormat": "RPS",
              "refId": "A"
            }
          ],
          "title": "⚡ Requests / Second",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 200 }
                ]
              },
              "unit": "short",
              "decimals": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(active_requests{namespace=\"cab-booking\", pod=~\"$pod\"}) or sum(cab_booking_nodejs_active_requests_total{namespace=\"cab-booking\", pod=~\"$pod\"})",
              "instant": true,
              "legendFormat": "Active",
              "refId": "A"
            }
          ],
          "title": "🔄 Active Requests",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              },
              "unit": "percentunit",
              "decimals": 3
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "cab_booking:http_error_rate5m",
              "instant": true,
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ],
          "title": "🔴 5xx Error Rate",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.2 },
                  { "color": "red", "value": 1.0 }
                ]
              },
              "unit": "s",
              "decimals": 3
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "cab_booking:http_latency_p99",
              "instant": true,
              "legendFormat": "P99",
              "refId": "A"
            }
          ],
          "title": "🐢 P99 Latency",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                {
                  "options": {
                    "0": { "color": "red", "index": 0, "text": "DOWN" },
                    "1": { "color": "green", "index": 1, "text": "UP" }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "id": 6,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "up{namespace=\"cab-booking\", pod=~\"$pod\"}",
              "instant": true,
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "💚 Service Status",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "title": "🌐 HTTP Traffic & Status Codes",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" }
              },
              "unit": "reqps"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "2xx" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#73BF69", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "3xx" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#F2CC0C", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "4xx" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#FF9830", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "5xx" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#F2495C", "mode": "fixed" } }]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 16, "x": 0, "y": 6 },
          "id": 10,
          "options": {
            "legend": {
              "calcs": ["mean", "max", "lastNotNull"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\", status=~\"2..\"}[5m]))",
              "legendFormat": "2xx",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\", status=~\"3..\"}[5m]))",
              "legendFormat": "3xx",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\", status=~\"4..\"}[5m]))",
              "legendFormat": "4xx",
              "refId": "C"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\", status=~\"5..\"}[5m]))",
              "legendFormat": "5xx",
              "refId": "D"
            }
          ],
          "title": "📈 HTTP Requests by Status Code",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              },
              "unit": "percentunit",
              "min": 0,
              "max": 0.1
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 6 },
          "id": 11,
          "options": {
            "minVizHeight": 75,
            "minVizWidth": 75,
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": true,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\", status=~\"5..\"}[5m])) / sum(rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\"}[5m]))",
              "instant": true,
              "legendFormat": "5xx Rate",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\", status=~\"4..\"}[5m])) / sum(rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\"}[5m]))",
              "instant": true,
              "legendFormat": "4xx Rate",
              "refId": "B"
            }
          ],
          "title": "🎯 Error Rate Gauge",
          "type": "gauge"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 102,
          "title": "🛣️ Routes & Endpoints",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "auto" },
                "filterable": true,
                "inspect": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "RPS" },
                "properties": [
                  { "id": "unit", "value": "reqps" },
                  { "id": "decimals", "value": 3 },
                  {
                    "id": "custom.cellOptions",
                    "value": { "mode": "gradient", "type": "color-background" }
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 10 },
                        { "color": "red", "value": 50 }
                      ]
                    }
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Error Rate" },
                "properties": [
                  { "id": "unit", "value": "percentunit" },
                  { "id": "decimals", "value": 2 },
                  {
                    "id": "custom.cellOptions",
                    "value": { "mode": "gradient", "type": "color-background" }
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 0.01 },
                        { "color": "red", "value": 0.05 }
                      ]
                    }
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "P95 Latency (s)" },
                "properties": [
                  { "id": "unit", "value": "s" },
                  { "id": "decimals", "value": 3 },
                  {
                    "id": "custom.cellOptions",
                    "value": { "mode": "gradient", "type": "color-background" }
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 0.2 },
                        { "color": "red", "value": 1.0 }
                      ]
                    }
                  }
                ]
              }
            ]
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 15 },
          "id": 20,
          "options": {
            "cellHeight": "sm",
            "footer": { "show": false },
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "RPS" }]
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (route, method) (rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\"}[5m]))",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (route, method) (rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\", status=~\"5..\"}[5m])) / sum by (route, method) (rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\"}[5m]))",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum by (route, method, le) (rate(http_request_duration_seconds_bucket{namespace=\"cab-booking\", pod=~\"$pod\"}[5m])))",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "C"
            }
          ],
          "title": "🗺️ Requests by Route",
          "transformations": [
            { "id": "merge", "options": {} },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "renameByName": {
                  "Value #A": "RPS",
                  "Value #B": "Error Rate",
                  "Value #C": "P95 Latency (s)",
                  "method": "Method",
                  "route": "Route"
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 1,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "normal" }
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 25 },
          "id": 21,
          "options": {
            "legend": {
              "calcs": ["mean", "max"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "topk(10, sum by (route) (rate(http_requests_total{namespace=\"cab-booking\", pod=~\"$pod\"}[5m])))",
              "legendFormat": "{{route}}",
              "refId": "A"
            }
          ],
          "title": "🏆 Top 10 Endpoints by Traffic",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 1,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "none" }
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 25 },
          "id": 22,
          "options": {
            "legend": {
              "calcs": ["mean", "max"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "topk(10, histogram_quantile(0.95, sum by (route, le) (rate(http_request_duration_seconds_bucket{namespace=\"cab-booking\", pod=~\"$pod\"}[5m]))))",
              "legendFormat": "{{route}}",
              "refId": "A"
            }
          ],
          "title": "🐌 Slowest Endpoints (P95)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 33 },
          "id": 103,
          "title": "⏱️ Latency Percentiles",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "s",
